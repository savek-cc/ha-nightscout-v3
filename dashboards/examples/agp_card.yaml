# The stat_agp_14d sensor exposes per-hour percentiles as attributes
# (p5_by_hour / p25_by_hour / p50_by_hour / p75_by_hour / p95_by_hour, each a
# 24-entry list indexed by hour 0-23). It is disabled by default; enable it in
# HA's entity registry first. For a ribbon-style AGP, apexcharts-card can plot
# each attribute as a separate series.
type: custom:apexcharts-card
header:
  show: true
  title: AGP – stündliche Perzentile (14 d)
graph_span: 14d
series:
  - entity: sensor.nightscout_v3_stat_agp_14d
    attribute: p5_by_hour
    name: p5
    stroke_width: 1
  - entity: sensor.nightscout_v3_stat_agp_14d
    attribute: p25_by_hour
    name: p25
    stroke_width: 1
  - entity: sensor.nightscout_v3_stat_agp_14d
    attribute: p50_by_hour
    name: median
    stroke_width: 2
  - entity: sensor.nightscout_v3_stat_agp_14d
    attribute: p75_by_hour
    name: p75
    stroke_width: 1
  - entity: sensor.nightscout_v3_stat_agp_14d
    attribute: p95_by_hour
    name: p95
    stroke_width: 1
