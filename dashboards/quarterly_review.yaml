# Nightscout v3 – Quartalsbericht für Diabetologen-Visite
#
# Optimiert für den 3-Monats-Kontrollbesuch: orientiert sich am International
# Consensus on Time in Range (Battelino et al., Diabetes Care 2019) und den
# ADA Standards of Care.
#
# Voraussetzungen
# ---------------
# - HACS-Frontend: apexcharts-card (einzige Abhängigkeit für dieses Dashboard)
# - HA 2024.6+ (für `type: sections`)
# - In den Integrationsoptionen:
#     - Statistikfenster 30 und 90 Tage aktivieren (14 ist Pflicht)
#     - Features stat_agp_14d, stat_lbgi_90d und stat_hbgi_90d aktivieren
# - Entity-Prefix passt zum Default-Slug der Integration (nightscout_v3_*).
#   Wenn der Config-Entry-Titel anders ist, Search-and-Replace von
#   "nightscout_v3" zum Slug-Namen der eigenen Instanz durchführen.
#
# Druck-Workflow
# --------------
# Browser → Druckvorschau → Querformat → "Als PDF speichern".

title: Nightscout Quartal
views:
- title: Quartalsbericht
  path: quarterly
  icon: mdi:file-chart-outline
  type: sections
  max_columns: 2
  sections:
  - type: grid
    cards:
    - type: markdown
      content: |
        ## CGM-Quartalsbericht (90 Tage)
        **Erstellt:** {{ now().strftime('%d.%m.%Y %H:%M') }} ·
        Zeitraum 90 Tage · AGP 14 Tage ·
        Ziel 70–180 mg/dL · Hypo < 70 · schwer < 54
    - type: tile
      entity: sensor.nightscout_v3_bg_aktuell
      name: Aktueller Blutzucker
      icon: mdi:water
      vertical: false
      state_content:
      - state
      - last-updated
    - type: heading
      heading: Time in Range
      heading_style: title
      icon: mdi:chart-donut
    - type: custom:apexcharts-card
      header:
        show: true
        title: TIR-Verteilung 90 Tage
      chart_type: donut
      apex_config:
        chart:
          height: 280
        colors:
        - '#7e1e1e'
        - '#e06060'
        - '#35b94a'
        - '#f5b841'
        - '#c27b0e'
        legend:
          position: bottom
        dataLabels:
          formatter: |
            EVAL:function(val) { return val.toFixed(0) + '%' }
        plotOptions:
          pie:
            donut:
              labels:
                show: true
                name:
                  show: true
                  fontSize: 14px
                value:
                  show: true
                  fontSize: 22px
                  formatter: |
                    EVAL:function(val) { return Math.round(Number(val)) + '%' }
                total:
                  show: true
                  label: im Ziel
                  formatter: |
                    EVAL:function(w) { return Math.round(w.globals.seriesTotals[2]) + '%' }
      series:
      - entity: sensor.nightscout_v3_tir_sehr_niedrig_90d
        name: <54
      - entity: sensor.nightscout_v3_tir_niedrig_90d
        name: 54–69
      - entity: sensor.nightscout_v3_tir_im_zielbereich_90d
        name: 70–180 (Ziel)
      - entity: sensor.nightscout_v3_tir_hoch_90d
        name: 181–250
      - entity: sensor.nightscout_v3_tir_sehr_hoch_90d
        name: '>250'
    - type: markdown
      content: |
        **TIR-Trend 14 / 30 / 90 d**

        | Fenster | &lt;54 | 54–69 | **70–180** | 181–250 | &gt;250 |
        |---|---:|---:|---:|---:|---:|
        | 14 d | {{ states('sensor.nightscout_v3_tir_sehr_niedrig_14d') }} % | {{ states('sensor.nightscout_v3_tir_niedrig_14d') }} % | **{{ states('sensor.nightscout_v3_tir_im_zielbereich_14d') }} %** | {{ states('sensor.nightscout_v3_tir_hoch_14d') }} % | {{ states('sensor.nightscout_v3_tir_sehr_hoch_14d') }} % |
        | 30 d | {{ states('sensor.nightscout_v3_tir_sehr_niedrig_30d') }} % | {{ states('sensor.nightscout_v3_tir_niedrig_30d') }} % | **{{ states('sensor.nightscout_v3_tir_im_zielbereich_30d') }} %** | {{ states('sensor.nightscout_v3_tir_hoch_30d') }} % | {{ states('sensor.nightscout_v3_tir_sehr_hoch_30d') }} % |
        | 90 d | {{ states('sensor.nightscout_v3_tir_sehr_niedrig_90d') }} % | {{ states('sensor.nightscout_v3_tir_niedrig_90d') }} % | **{{ states('sensor.nightscout_v3_tir_im_zielbereich_90d') }} %** | {{ states('sensor.nightscout_v3_tir_hoch_90d') }} % | {{ states('sensor.nightscout_v3_tir_sehr_hoch_90d') }} % |
  - type: grid
    cards:
    - type: heading
      heading: Kernkennzahlen (90 d)
      heading_style: title
    - type: grid
      columns: 3
      square: false
      cards:
      - type: gauge
        entity: sensor.nightscout_v3_gmi_90d
        name: GMI
        unit: '%'
        min: 5
        max: 10
        needle: true
        segments:
        - from: 5
          color: '#35b94a'
        - from: 7
          color: '#f5b841'
        - from: 7.5
          color: '#c0392b'
      - type: gauge
        entity: sensor.nightscout_v3_tir_im_zielbereich_90d
        name: TIR 70–180
        unit: '%'
        min: 0
        max: 100
        needle: true
        segments:
        - from: 0
          color: '#c0392b'
        - from: 50
          color: '#f5b841'
        - from: 70
          color: '#35b94a'
      - type: gauge
        entity: sensor.nightscout_v3_cv_90d
        name: CV
        unit: '%'
        min: 0
        max: 60
        needle: true
        segments:
        - from: 0
          color: '#35b94a'
        - from: 36
          color: '#f5b841'
        - from: 42
          color: '#c0392b'
    - type: glance
      show_name: true
      show_state: true
      columns: 3
      entities:
      - entity: sensor.nightscout_v3_mittlere_bg_90d
        name: Mean
      - entity: sensor.nightscout_v3_sd_90d
        name: SD
      - entity: sensor.nightscout_v3_hba1c_90d
        name: eHbA1c
    - type: heading
      heading: Risikoindizes (90 d)
      heading_style: subtitle
    - type: grid
      columns: 2
      square: false
      cards:
      - type: gauge
        entity: sensor.nightscout_v3_lbgi_90d
        name: LBGI (Hypo-Risiko)
        min: 0
        max: 10
        needle: true
        segments:
        - from: 0
          color: '#35b94a'
        - from: 2.5
          color: '#f5b841'
        - from: 5
          color: '#c0392b'
      - type: gauge
        entity: sensor.nightscout_v3_hbgi_90d
        name: HBGI (Hyper-Risiko)
        min: 0
        max: 20
        needle: true
        segments:
        - from: 0
          color: '#35b94a'
        - from: 9
          color: '#f5b841'
        - from: 15
          color: '#c0392b'
  - type: grid
    cards:
    - type: heading
      heading: Ambulantes Glukoseprofil (AGP, 14 d)
      heading_style: title
      icon: mdi:chart-bell-curve
    - type: custom:apexcharts-card
      header:
        show: true
        title: Perzentile p5 · p25 · Median · p75 · p95 über 24 h
      chart_type: line
      apex_config:
        chart:
          height: 320
          type: line
        stroke:
          curve: smooth
          width:
          - 1
          - 2
          - 3
          - 2
          - 1
        colors:
        - '#9aa8bb'
        - '#4e80ff'
        - '#111'
        - '#4e80ff'
        - '#9aa8bb'
        xaxis:
          type: datetime
          labels:
            datetimeUTC: true
            format: HH:mm
        yaxis:
          min: 40
          max: 360
          decimalsInFloat: 0
          title:
            text: mg/dL
        tooltip:
          x:
            formatter: |
              EVAL:function(v) { var h = Math.round(v); return (h < 10 ? '0' + h : h) + ':00 Uhr' }
        annotations:
          yaxis:
          - y: 70
            borderColor: '#e06060'
            label:
              text: '70'
          - y: 180
            borderColor: '#f5b841'
            label:
              text: '180'
          - y: 54
            borderColor: '#7e1e1e'
            strokeDashArray: 4
      series:
      - entity: sensor.nightscout_v3_agp_perzentile_14d
        name: p5
        data_generator: |
          const arr = entity.attributes.p5_by_hour || [];
          const d = new Date(); d.setUTCHours(0,0,0,0);
          const base = d.getTime();
          return arr.map((v, i) => [base + i * 3600000, v]);
      - entity: sensor.nightscout_v3_agp_perzentile_14d
        name: p25
        data_generator: |
          const arr = entity.attributes.p25_by_hour || [];
          const d = new Date(); d.setUTCHours(0,0,0,0);
          const base = d.getTime();
          return arr.map((v, i) => [base + i * 3600000, v]);
      - entity: sensor.nightscout_v3_agp_perzentile_14d
        name: Median
        data_generator: |
          const arr = entity.attributes.p50_by_hour || [];
          const d = new Date(); d.setUTCHours(0,0,0,0);
          const base = d.getTime();
          return arr.map((v, i) => [base + i * 3600000, v]);
      - entity: sensor.nightscout_v3_agp_perzentile_14d
        name: p75
        data_generator: |
          const arr = entity.attributes.p75_by_hour || [];
          const d = new Date(); d.setUTCHours(0,0,0,0);
          const base = d.getTime();
          return arr.map((v, i) => [base + i * 3600000, v]);
      - entity: sensor.nightscout_v3_agp_perzentile_14d
        name: p95
        data_generator: |
          const arr = entity.attributes.p95_by_hour || [];
          const d = new Date(); d.setUTCHours(0,0,0,0);
          const base = d.getTime();
          return arr.map((v, i) => [base + i * 3600000, v]);
      graph_span: 24h
      span:
        start: day
  - type: grid
    cards:
    - type: heading
      heading: Fenster-Vergleich (Kernwerte)
      heading_style: title
    - type: entities
      title: 14 Tage
      entities:
      - entity: sensor.nightscout_v3_gmi_14d
        name: GMI
      - entity: sensor.nightscout_v3_tir_im_zielbereich_14d
        name: TIR 70–180
      - entity: sensor.nightscout_v3_cv_14d
        name: CV
      - entity: sensor.nightscout_v3_mittlere_bg_14d
        name: Mean
      - entity: sensor.nightscout_v3_sd_14d
        name: SD
    - type: entities
      title: 30 Tage
      entities:
      - entity: sensor.nightscout_v3_gmi_30d
        name: GMI
      - entity: sensor.nightscout_v3_tir_im_zielbereich_30d
        name: TIR 70–180
      - entity: sensor.nightscout_v3_cv_30d
        name: CV
      - entity: sensor.nightscout_v3_mittlere_bg_30d
        name: Mean
      - entity: sensor.nightscout_v3_sd_30d
        name: SD
    - type: entities
      title: 90 Tage
      entities:
      - entity: sensor.nightscout_v3_gmi_90d
        name: GMI
      - entity: sensor.nightscout_v3_tir_im_zielbereich_90d
        name: TIR 70–180
      - entity: sensor.nightscout_v3_cv_90d
        name: CV
      - entity: sensor.nightscout_v3_mittlere_bg_90d
        name: Mean
      - entity: sensor.nightscout_v3_sd_90d
        name: SD
  - type: grid
    cards:
    - type: heading
      heading: Loop-Kontext (aktuell)
      heading_style: title
    - type: entities
      entities:
      - entity: binary_sensor.nightscout_v3_loop_aktiv
        name: Loop aktiv
      - entity: sensor.nightscout_v3_loop_modus
        name: Loop-Modus
      - entity: sensor.nightscout_v3_loop_iob
        name: IOB
      - entity: sensor.nightscout_v3_loop_cob
        name: COB
      - entity: sensor.nightscout_v3_loop_prognose_bg
        name: Prognose
      - entity: sensor.nightscout_v3_loop_zielwert
        name: Zielwert
      - entity: sensor.nightscout_v3_loop_sensitivitat
        name: Sensitivität
      - entity: sensor.nightscout_v3_loop_letzte_aktion_min
        name: Letzte Loop-Aktion (min)
      - entity: sensor.nightscout_v3_pumpen_status
        name: Pumpenstatus
  - type: grid
    cards:
    - type: heading
      heading: Textbericht (zum Copy-Paste)
      heading_style: title
      icon: mdi:text-box-outline
    - type: markdown
      content: |
        ### CGM-Bericht – 90 Tage
        Erstellt: {{ now().strftime('%d.%m.%Y %H:%M') }}

        **Glykämische Kontrolle**
        | Kennzahl | Wert | Referenz |
        |---|---|---|
        | Mittlere Glukose | {{ states('sensor.nightscout_v3_mittlere_bg_90d') }} mg/dL | — |
        | Standardabweichung | {{ states('sensor.nightscout_v3_sd_90d') }} mg/dL | — |
        | Variationskoeffizient | {{ states('sensor.nightscout_v3_cv_90d') }} % | ≤ 36 % |
        | GMI | {{ states('sensor.nightscout_v3_gmi_90d') }} % | individuell |
        | eHbA1c (DCCT) | {{ states('sensor.nightscout_v3_hba1c_90d') }} % | — |
        | LBGI | {{ states('sensor.nightscout_v3_lbgi_90d') }} | < 2,5 |
        | HBGI | {{ states('sensor.nightscout_v3_hbgi_90d') }} | < 9 |

        **Time in Range**
        | Bereich | Anteil | Ziel |
        |---|---|---|
        | < 54 mg/dL | {{ states('sensor.nightscout_v3_tir_sehr_niedrig_90d') }} % | < 1 % |
        | 54–69 mg/dL | {{ states('sensor.nightscout_v3_tir_niedrig_90d') }} % | < 4 % (ges.) |
        | 70–180 mg/dL | **{{ states('sensor.nightscout_v3_tir_im_zielbereich_90d') }} %** | > 70 % |
        | 181–250 mg/dL | {{ states('sensor.nightscout_v3_tir_hoch_90d') }} % | < 25 % (ges.) |
        | > 250 mg/dL | {{ states('sensor.nightscout_v3_tir_sehr_hoch_90d') }} % | < 5 % |

        **Verlauf 14 / 30 / 90 d**
        | Fenster | TIR | GMI | CV |
        |---|---|---|---|
        | 14 d | {{ states('sensor.nightscout_v3_tir_im_zielbereich_14d') }} % | {{ states('sensor.nightscout_v3_gmi_14d') }} % | {{ states('sensor.nightscout_v3_cv_14d') }} % |
        | 30 d | {{ states('sensor.nightscout_v3_tir_im_zielbereich_30d') }} % | {{ states('sensor.nightscout_v3_gmi_30d') }} % | {{ states('sensor.nightscout_v3_cv_30d') }} % |
        | 90 d | {{ states('sensor.nightscout_v3_tir_im_zielbereich_90d') }} % | {{ states('sensor.nightscout_v3_gmi_90d') }} % | {{ states('sensor.nightscout_v3_cv_90d') }} % |

        ---
        *Referenzwerte nach International Consensus on Time in Range (Battelino et al., Diabetes Care 2019).*
