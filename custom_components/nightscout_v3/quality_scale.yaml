rules:
  # Bronze
  action-setup:
    status: exempt
    comment: The integration does not register services in v1 (careportal writes are v2 roadmap).
  appropriate-polling: done
  brands:
    status: todo
    comment: PR to home-assistant/brands required before HACS listing.
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: The integration does not register services in v1.
  docs-high-level-description:
    status: done
    comment: See README "What it does" section.
  docs-installation-instructions:
    status: done
    comment: See README "Installation via HACS" section.
  docs-removal-instructions:
    status: done
    comment: See README "Removing the integration" section.
  entity-event-setup:
    status: exempt
    comment: >
      Entities do not subscribe to push events. All data is pulled through the
      DataUpdateCoordinator.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done
  # Silver
  action-exceptions:
    status: exempt
    comment: The integration does not register services in v1.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: done
    comment: See README "Configuration" section and the Options flow walkthrough.
  docs-installation-parameters:
    status: done
    comment: See README "Configuration → User step" (URL and access token).
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done
