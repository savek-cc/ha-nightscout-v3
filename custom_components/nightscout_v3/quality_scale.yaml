rules:
  # Bronze
  action-setup:
    status: exempt
    comment: The integration does not register services in v1 (careportal writes are v2 roadmap).
  appropriate-polling: done
  brands:
    status: exempt
    comment: >
      Custom component distributed exclusively via HACS. Brand assets
      for a future PR to home-assistant/brands are staged in
      `brands/custom_integrations/nightscout_v3/`.
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: The integration does not register services in v1.
  docs-high-level-description:
    status: done
    comment: See README "What it does" section.
  docs-installation-instructions:
    status: done
    comment: See README "Installation via HACS" section.
  docs-removal-instructions:
    status: done
    comment: See README "Removing the integration" section.
  entity-event-setup:
    status: exempt
    comment: >
      Entities do not subscribe to push events. All data is pulled through the
      DataUpdateCoordinator.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done
  # Silver
  action-exceptions:
    status: exempt
    comment: The integration does not register services in v1.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: done
    comment: See README "Configuration" section and the Options flow walkthrough.
  docs-installation-parameters:
    status: done
    comment: See README "Configuration → User step" (URL and access token).
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done
  # Gold
  devices:
    status: done
    comment: >
      Every entity belongs to a device representing the Nightscout server
      (see `NightscoutEntity._attr_device_info`).
  discovery:
    status: exempt
    comment: Nightscout servers do not advertise via mDNS/SSDP; URL is supplied manually.
  discovery-update-info:
    status: exempt
    comment: No discovery protocol applies; see `discovery`.
  docs-data-update:
    status: done
    comment: >
      README "Options flow" describes the fast / change-detect / stats polling
      cycles and their configurable intervals.
  docs-supported-functions:
    status: done
    comment: See README "What it does" and "Features overview" table.
  docs-troubleshooting:
    status: done
    comment: See README "Troubleshooting" section.
  dynamic-devices:
    status: exempt
    comment: >
      One Nightscout server = one logical device; new capabilities are
      surfaced as entities of the existing device via the
      "Rediscover capabilities" options step.
  entity-device-class:
    status: done
    comment: >
      Appropriate SensorDeviceClass / BinarySensorDeviceClass applied where
      semantically meaningful (battery, timestamp, connectivity, running,
      battery_charging). Value sensors without a fitting class stay unset.
  entity-translations:
    status: done
    comment: >
      Every entity uses `_attr_has_entity_name = True` and
      `_attr_translation_key` driven by `FeatureDef.translation_key`;
      translations shipped in strings.json and translations/*.json.
  docs-examples:
    status: done
    comment: >
      Three copy-paste dashboard YAML snippets under
      `dashboards/examples/` (bg_card, loop_card, agp_card) — each
      referenced from the README with a short purpose line.
  docs-known-limitations:
    status: done
    comment: See README "Known limitations" section.
  docs-supported-devices:
    status: done
    comment: >
      README "Tested upstream stacks" table enumerates the upstream
      Nightscout + uploader combinations exercised against this
      integration (AAPS, Loop/iAPS, xDrip+, Care Portal only) with
      version ranges. Individual CGM hardware is out of scope; this
      integration connects to a Nightscout server, not to CGMs.
  docs-use-cases:
    status: done
    comment: See README "Use cases" section.
  entity-category:
    status: done
    comment: >
      `FeatureDef.entity_category` carried through `NightscoutEntity`.
      Battery, staleness, loop-age, sensor/site/insulin/pump-battery age
      sensors are marked `EntityCategory.DIAGNOSTIC`.
  entity-disabled-by-default:
    status: done
    comment: >
      `FeatureDef.default_enabled=False` on noisy/advanced features
      (`loop_reason`, `loop_pred_bgs`, `care_last_note`, `stat_lbgi`,
      `stat_hbgi`, `stat_hourly_profile`, `stat_agp`). Enforced through
      the options-flow enabled-features dict on platform setup, which
      is the canonical place for a capability-gated integration.
  exception-translations:
    status: done
    comment: >
      `ConfigEntryAuthFailed` / `ConfigEntryNotReady` raises in setup use
      `translation_domain` + `translation_key` with placeholders; the
      `exceptions` block in `strings.json` carries the localized text.
  icon-translations:
    status: done
    comment: >
      `icons.json` carries 46 sensor icons keyed by `translation_key`.
      `NightscoutEntity` no longer sets `_attr_icon`; feature registry no
      longer stores an `icon=` field.
  reconfiguration-flow:
    status: done
    comment: >
      `NightscoutConfigFlow.async_step_reconfigure` lets the user change
      URL and/or token, re-probes capabilities, and aborts on
      `unique_id_mismatch` when the new URL points at a different
      Nightscout server already configured.
  repair-issues:
    status: done
    comment: >
      On 404 from `/api/v3/status` during capability probe (Nightscout
      < 15.0) the integration creates a persistent repair issue keyed
      on the entry; cleared on every successful probe. Translation
      strings in `issues.server_incompatible`.
  stale-devices:
    status: done
    comment: >
      `async_remove_config_entry_device` returns True — one-device-per-
      entry integration; the device is re-created on the next setup if
      the entry still exists.
  # Platinum
  async-dependency:
    status: done
    comment: >
      All I/O goes through async libraries: aiohttp for the Nightscout
      REST API, aiosqlite for the history store. Sync FS operations
      (mkdir, rename) run via `hass.async_add_executor_job` / `asyncio.to_thread`.
  inject-websession:
    status: done
    comment: >
      `__init__.py`, `config_flow.py` and all other sites acquire the
      aiohttp session via `async_get_clientsession(hass)`. No
      `aiohttp.ClientSession()` construction in the component.
  strict-typing:
    status: done
    comment: >
      `mypy --strict` passes on `custom_components/nightscout_v3/`
      (configured in `pyproject.toml` via `[tool.mypy] strict = true`,
      enforced in CI through the mypy pre-commit hook).
